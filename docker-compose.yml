services:
  qdrant:
    image: qdrant/qdrant
    ports: ["6333:6333"]
    volumes: ["qdrant_data:/qdrant/storage"]

  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["ollama_data:/root/.ollama"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 3s
      retries: 30

  app:
    build: .
    depends_on:
      qdrant:
        condition: service_started
      ollama:
        condition: service_healthy
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ./:/app          # repo (incl. dunereco corpus + chunks.jsonl) lives on host
    # pull the two models into ollama (idempotent — skips if present), then idle so you can exec the pipeline
    command: ["bash", "-c", "python -c \"import ollama; [ollama.pull(m) for m in ('qwen3-embedding:0.6b','qwen2.5-coder:7b')]\" && tail -f /dev/null"]

volumes:
  qdrant_data:
  ollama_data:
